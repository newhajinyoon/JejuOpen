<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지역별 제주어 - 자유롭고 열린 제주어 사전</title>
    <link rel="stylesheet" href="./css/style.css">
    <script>
        const isDark = localStorage.getItem('theme') === 'dark' || localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 30px;">
            <h1 onclick="location.href='index.html'" style="font-size: 1.5rem; cursor: pointer;">자유롭고 열린 <span>제주어</span>사전</h1>
        </header>

        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-size: 2.5rem; margin: 0; color: var(--text-color);">
                조사 지역: <span id="regionName" style="color: var(--point-color);"></span>
            </h2>
            <a id="naverMapLink" href="#" target="_blank" class="btn-naver-map" style="margin-top:15px; width:auto; display:inline-flex; padding:12px 24px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                네이버 지도에서 보기
            </a>
        </div>

        <div class="region-map-container" style="margin-bottom: 40px;">
            <div class="jeju-map-wrapper" id="regionMapArea"></div>
        </div>

        <div class="region-stats" id="regionStats" style="text-align:center; margin-bottom:25px; font-weight:bold; color:var(--gray-text); font-size:1.1rem;"></div>
        
        <div class="search-container" style="margin-bottom: 30px;">
            <div class="search-input-wrapper">
                <form id="searchForm" autocomplete="off">
                    <input type="text" id="searchInput" placeholder="이 지역에서 조사된 단어 검색..." spellcheck="false">
                    <button type="submit" class="btn-search">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <div class="result-list" id="localResultList"></div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="javascript:history.back()" style="color: var(--text-color); font-weight:bold; font-size:1.1rem; border:2px solid var(--border-color); padding:12px 24px; border-radius:30px; display:inline-block;">← 돌아가기</a>
        </div>
    </div>

    <script src="./js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetRegion = urlParams.get('name');
        let regionWords = []; 

        document.getElementById('regionName').textContent = targetRegion || '알 수 없음';
        document.getElementById('naverMapLink').href = `https://map.naver.com/v5/search/제주특별자치도 ${targetRegion}`;

        const mapArea = document.getElementById('regionMapArea');
        let mapHtml = CLEAN_JEJU_SVG;
        if (targetRegion && regionCoordinates[targetRegion]) {
            const coords = regionCoordinates[targetRegion];
            mapHtml += `
                <div class="map-dot" style="left: ${coords[0]}%; top: ${coords[1]}%;"></div>
                <div class="map-dot-label" style="left: ${coords[0]}%; top: ${coords[1]}%;">${targetRegion}</div>
            `;
        }
        mapArea.innerHTML = mapHtml;

        loadDictionary().then(dictionary => {
            regionWords = dictionary.filter(item => item.reg && item.reg.includes(targetRegion));
            document.getElementById('regionStats').innerHTML = `이 지역에서 조사된 총 단어: <span style="color:var(--text-color); font-size:1.2rem;">${regionWords.length}</span>개`;
            renderList(regionWords);
        });

        function renderList(listToRender) {
            const listDiv = document.getElementById('localResultList');
            if (listToRender.length > 0) {
                listDiv.innerHTML = listToRender.map(item => {
                    const mainDesc = item.desc || (item.senses && item.senses.length > 0 ? item.senses[0].desc : '');
                    return `
                        <div class="result-card" onclick="location.href='word.html?id=${item.id}'">
                            <div>
                                <span class="result-card-word">${item.word}${item.h ? `<sup style="font-size:0.75rem; color:var(--gray-text); margin-left:3px;">${item.h}</sup>` : ''}</span>
                                <span class="result-card-std">${item.std || ''}</span>
                            </div>
                            <div class="result-card-desc" style="color: var(--text-color);">${mainDesc}</div>
                        </div>
                    `;
                }).join('');
            } else {
                listDiv.innerHTML = `<div style="text-align:center; padding: 40px 0; color:var(--gray-text); font-size:1.1rem;">일치하는 단어가 없습니다.</div>`;
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = normalize(e.target.value);
            if (!val) { renderList(regionWords); return; }
            const filtered = regionWords.filter(item => 
                normalize(item.word).includes(val) || (item.std && normalize(item.std).includes(val))
            );
            renderList(filtered);
        });

        document.getElementById('searchForm').addEventListener('submit', e => e.preventDefault());
    </script>
    <script src="./js/old-hangul.js"></script>
</body>
</html>
