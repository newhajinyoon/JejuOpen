<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유롭고 열린 제주어 사전</title>
    <link rel="stylesheet" href="./css/style.css">
    <script>
        const isDark = localStorage.getItem('theme') === 'dark' || localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- 상단 기능 버튼 모음 (다크모드 & 단어장) -->
        <div class="header-actions">
            <button class="icon-btn" onclick="location.href='about.html'" title="사전 소개">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </button>
            <button class="icon-btn" onclick="location.href='fav.html'" title="단어장 보기">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
            <button class="icon-btn" onclick="toggleDarkMode()" title="다크모드 전환">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <header>
            <h1 onclick="location.href='index.html'">자유롭고 열린 <span>제주어</span>사전</h1>
        </header>

        <div class="search-container">
            <div class="search-input-wrapper">
                <form id="searchForm" autocomplete="off">
                    <input type="text" id="searchInput" placeholder="단어 또는 표준어를 검색하세요">
                    <button type="submit" class="btn-search">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </form>
                
                <!-- 최근 검색어 패널 -->
                <div id="recentSearches" class="recent-searches">
                    <div class="recent-header">
                        <span>최근 검색어</span>
                        <span style="cursor:pointer;" onclick="removeAllRecents()">전체 삭제</span>
                    </div>
                    <div id="recentList"></div>
                </div>
            </div>
            
            <div id="searchDropdown" class="search-dropdown">
                <table id="resultsTable"></table>
            </div>
        </div>

        <div id="randomSection"></div>

        <footer>
            자유롭고 열린 제주어 사전 출처: <a href="https://www.jeju.go.kr/jejueo/index.htm" target="_blank">제주특별자치도</a>
        </footer>
    </div>

    <script src="./js/common.js"></script>
    <script>
        let dictionary = [];
        const searchInput = document.getElementById('searchInput');
        const recentBox = document.getElementById('recentSearches');
        
        loadDictionary().then(data => {
            dictionary = data;
            showRandomWord();
        });

        function showRandomWord() {
            if(dictionary.length === 0) return;
            const random = dictionary[Math.floor(Math.random() * dictionary.length)];
            const mainDesc = random.desc || (random.senses && random.senses.length > 0 ? random.senses[0].desc : '');
            
            document.getElementById('randomSection').innerHTML = `
                <div class="random-card" onclick="location.href='word.html?id=${random.id}'">
                    <div class="tag">오늘의 제주어</div>
                    <h2 class="random-title">${random.word}</h2>
                    <p class="random-desc">${mainDesc}</p>
                    <span style="color:var(--point-color); font-weight:bold;">자세히 보기 →</span>
                </div>
            `;
        }

        searchInput.addEventListener('input', (e) => {
            const val = normalize(e.target.value);
            recentBox.style.display = 'none';

            if (val.length < 1) {
                document.getElementById('searchDropdown').style.display = 'none';
                renderRecentSearches();
                return;
            }

            const filtered = dictionary.filter(item => 
                normalize(item.word).includes(val) || (item.std && normalize(item.std).includes(val))
            ).slice(0, 10);

            const table = document.getElementById('resultsTable');
            const dropdown = document.getElementById('searchDropdown');
            
            if (filtered.length > 0) {
                table.innerHTML = filtered.map(item => `
                    <tr onclick="location.href='word.html?id=${item.id}'">
                        <td>
                            <span class="res-word">${item.word}${item.h ? `<sup style="font-size:0.7rem; color:var(--gray-text);">${item.h}</sup>` : ''}</span>
                            <span class="res-std">${item.std || ''}</span>
                        </td>
                    </tr>
                `).join('');
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        });

        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = searchInput.value.trim();
            if (!val) return;
            addRecentSearch(val);
            location.href = `search.html?q=${encodeURIComponent(val)}`;
        });

        searchInput.addEventListener('focus', renderRecentSearches);
        
        function renderRecentSearches() {
            if (searchInput.value.trim() !== '') return;
            const recents = getRecentSearches();
            if (recents.length > 0) {
                document.getElementById('recentList').innerHTML = recents.map(term => `
                    <div class="recent-item">
                        <span onclick="location.href='search.html?q=${encodeURIComponent(term)}'" style="flex-grow:1; width:100%;">${term}</span>
                        <button class="btn-del-recent" onclick="removeRecent('${term}')">&times;</button>
                    </div>
                `).join('');
                recentBox.style.display = 'block';
            } else {
                recentBox.style.display = 'none';
            }
        }
        
        function removeRecent(term) { removeRecentSearch(term); renderRecentSearches(); }
        function removeAllRecents() { clearRecentSearches(); recentBox.style.display = 'none'; }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                document.getElementById('searchDropdown').style.display = 'none';
                recentBox.style.display = 'none';
            }
        });
    </script>
    <script src="./js/old-hangul.js"></script>
</body>
</html>
